plugins {
    id 'fabric-loom' version '1.16.1'
    id 'babric-loom-extension' version '1.9.2'
}

archivesBaseName = mod_id
version = mod_version

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

repositories {
    maven { url = 'https://maven.fabricmc.net/' }
    maven { url = 'https://maven.glass-launcher.net/babric' }
    maven { url = 'https://maven.glass-launcher.net/snapshots' }
    maven { url = 'https://maven.glass-launcher.net/releases' }
    maven { url = 'https://maven.minecraftforge.net/' }
    maven { url = 'https://jitpack.io/' }
    mavenCentral()
    exclusiveContent {
        forRepository {
            maven { url = 'https://api.modrinth.com/maven' }
        }
        filter { includeGroup 'maven.modrinth' }
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${minecraft_version}"
    mappings "net.glasslauncher:biny:${yarn_mappings}:v2"
    // Babric fork — StationAPI transitively pulls this in, declaring the
    // upstream `net.fabricmc:fabric-loader` here causes a duplicate-loader
    // class-path collision at runtime.
    modImplementation "babric:fabric-loader:0.15.6-babric.1"

    // StationAPI provides the BlockRegistryEvent / BlockEntityRegisterEvent /
    // BlockEntityRendererRegisterEvent we listen to.
    modImplementation "net.modificationstation:StationAPI:${stationapi_version}"

    // The lib under test — resolved via the includeBuild('..') composite in
    // settings.gradle, so edits in ../core or ../src don't need a manual jar
    // rebuild.
    modImplementation "dev.aerocoding:aero-model-lib:${mod_version}"

    // AMI + Glass Launcher mod stack — runtime-only because we don't compile
    // against any of their APIs, just want them present in-game for the
    // smoke test world. Versions pinned to the latest releases that were
    // built with Fabric-Loom 1.9.2 so they pass Loom's bundled-version
    // check at gradle-config time. Bumping past these requires Loom 1.11+
    // (which in turn needs Gradle 8.14 + JDK 21).
    modRuntimeOnly "net.glasslauncher.mods:AlwaysMoreItems:1.6.0"
    modRuntimeOnly "net.glasslauncher.mods:glass-networking:1.0.6"
    modRuntimeOnly "net.glasslauncher.mods:GlassConfigAPI:3.2.2"
    // modmenu has no Loom-1.9.2-built release (every published version was
    // built with Loom 1.11.7) — wait for the lib-wide Loom upgrade to add.
}

processResources {
    inputs.property "version", project.version
    inputs.property "mod_id", mod_id
    filesMatching("fabric.mod.json") {
        expand "version": project.version, "mod_id": mod_id
    }
}

// Loom dev runs.
loom {
    runs {
        client {
            client()
            ideConfigGenerated true
            runDir 'run'
        }
    }
}

def aeroExtraJvmArgs = {
    def raw = project.findProperty('aeroJvmArgs')
    if (raw == null) return []
    return raw.toString()
        .split(/\s+/)
        .findAll { it != null && !it.trim().isEmpty() }
}

// Bare runClient. NO heap bump, NO benchmark flags, NO spike logger.
// This is the "modpack user with default Loom JVM settings" simulation —
// what someone with Prism / Modrinth Launcher / etc gets out of the box.
// Use it to validate how the library behaves for end users. If you want
// a smooth dev session instead, use runClientDev.
tasks.named('runClient') {
    doFirst {
        def extra = aeroExtraJvmArgs()
        if (!extra.isEmpty()) {
            jvmArgs(extra)
            println '[runClient] extra Aero JVM args: ' + extra.join(' ')
        }
        println '[runClient] PRODUCTION-LIKE: default Loom JVM (~2G heap), '
            + 'vanilla autosave on, no spike logger. Use runClientDev for '
            + 'a tuned dev session.'
    }
}

// Developer convenience runner. Bumps heap so vanilla allocation doesn't
// trigger constant young-gen GC, and skips vanilla's periodic autosave
// (Ctrl+S and save-on-exit still fire — only the every-N-tick timer is
// canceled). Use this for manual playtesting / FPS tuning so the JVM
// shoestring doesn't dominate the perf signal you're trying to read.
//
// Why not bake these into runClient: a "production-like" task should
// reflect what an end user actually experiences. Hiding GC pressure /
// autosave hitches behind dev defaults made it impossible to notice
// regressions until shipping.
tasks.register('runClientDev') {
    group = 'fabric'
    description = 'Dev-tuned client run: bumped heap + vanilla autosave skip.'
    finalizedBy tasks.named('runClient')
    outputs.upToDateWhen { false }
    doLast {
        def runClient = tasks.named('runClient').get()
        runClient.jvmArgs('-Xms2G', '-Xmx4G',
                          '-Daero.benchmark.skipNonForcedSaves=true')
        println '[runClientDev] heap 2-4G + autosave skip enabled'
    }
}

// Profile-enabled client run. Adds:
//   • -Daero.profiler=true       — turns on the lib's own section profiler
//                                  (Aero_Profiler) which a test-mod hook
//                                  dumps every 60 s + on shutdown.
//   • -XX:StartFlightRecording   — records a JFR file for the entire run.
//                                  `settings=profile` includes CPU sampling
//                                  + allocation events. The flag syntax is
//                                  cross-version safe: works on OpenJDK
//                                  8u272+, Java 11+, and Java 17 without
//                                  any -XX:+UnlockCommercialFeatures /
//                                  -XX:+FlightRecorder pre-flags (those
//                                  are rejected on modern JVMs anyway).
//   • -XX:FlightRecorderOptions  — bumps repository size so a long session
//                                  doesn't drop chunks.
//
// Output JFR lands at run/aero-profile.jfr — analyse with
// `jfr summary` and `jfr print --events jdk.ExecutionSample`.
tasks.register('runClientProfile') {
    group = 'fabric'
    description = 'Run the client with Aero profiler + JFR recording enabled.'
    finalizedBy tasks.named('runClient')
    outputs.upToDateWhen { false }
    doLast {
        def runClient = tasks.named('runClient').get()
        def runDir = runClient.workingDir
        runDir.mkdirs()
        def jfrFile = new File(runDir, 'aero-profile.jfr').absolutePath
        def jfrRepo = new File(runDir, 'jfr-repo').absolutePath
        runClient.jvmArgs(
            '-Daero.profiler=true',
            '-XX:StartFlightRecording=filename=' + jfrFile + ',settings=profile,dumponexit=true,name=aero',
            '-XX:FlightRecorderOptions=repository=' + jfrRepo
        )
        println '[runClientProfile] aero.profiler=true · JFR -> ' + jfrFile
    }
}

// Diagnostic: runClient with chunk-visibility cull DISABLED. Used to
// isolate whether the per-chunk HOQ-based skip (Aero_ChunkVisibility)
// is responsible for visible-BE flicker on camera rotation. If BEs
// remain stable with this task and flicker with plain runClient, the
// HOQ leg is the culprit. Strictly diagnostic — remove once the cull
// stack is verified.
tasks.register('runClientNoChunkVis') {
    group = 'fabric'
    description = 'Run client with -Daero.chunkvisibility=false (HOQ flicker diagnostic).'
    finalizedBy tasks.named('runClient')
    outputs.upToDateWhen { false }
    doLast {
        def runClient = tasks.named('runClient').get()
        runClient.jvmArgs('-Daero.chunkvisibility=false')
        println '[runClientNoChunkVis] aero.chunkvisibility=false'
    }
}

