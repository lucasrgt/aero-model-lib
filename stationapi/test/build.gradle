    }
}

// Smooth — combined GC (ZGC) + JIT (C1-only) tuning. Targets the
// last residual spike pattern: ZGC took GC pauses to sub-ms, but
// JFR analysis showed 38 JIT compilations totaling 7.2 s over 86 s
// of play (median 147 ms each, max 478 ms) — the C2 server
// compiler stealing CPU briefly when it lands on a hot method.
//
// Stopping at C1 (the quick compiler) skips the expensive C2 stage
// entirely. Peak throughput drops slightly (~5-10%) but compilation
// is bounded to a few ms per method instead of hundreds. With
// modellib's own paths already CPU-light (<1% of profile), the
// peak loss is invisible while the spike pattern goes away.
//
// Use this flavour when "smooth frame-times" matters more than
// "absolute peak FPS" — i.e. anything that involves recording or
// player-facing demos.
tasks.register('runClientStressSmooth') {
    group = 'fabric'
    description = 'Stress + ZGC + C1-only JIT (no spike, no JIT stalls). Java 17+.'
    finalizedBy tasks.named('runClient')
    outputs.upToDateWhen { false }
    doLast {
        def runClient = tasks.named('runClient').get()
        def runDir = runClient.workingDir
        runDir.mkdirs()
        def jfrFile = new File(runDir, 'aero-stress-smooth.jfr').absolutePath
        def jfrRepo = new File(runDir, 'jfr-stress-smooth-repo').absolutePath
        runClient.jvmArgs(
            '-Daero.stresstest=true',
            '-Daero.profiler=true',
            '-Xms2G',
            '-Xmx4G',
            '-XX:+UnlockExperimentalVMOptions',
            '-XX:+UseZGC',
            '-XX:TieredStopAtLevel=1',
            '-XX:StartFlightRecording=filename=' + jfrFile + ',settings=profile,dumponexit=true,name=aero-stress-smooth',
            '-XX:FlightRecorderOptions=repository=' + jfrRepo
        )
        println '[runClientStressSmooth] ZGC + C1-only JIT · JFR -> ' + jfrFile
    }
}
