// Auto-quitting benchmark run. Adds `-Daero.benchmark.exitAfterSec=N` so
// the JVM kills itself cleanly N seconds after the test mod's profiler hook
// installs. Pair with -Daero.stresstest=true (or call runClientStress
// instead). Useful for CI-style perf comparisons where you want a fixed
// 90 s window of recorded data, parseable by the jfr_top.py helper.
//
// Override the duration with: `-Pbench=N` (defaults to 90 s).
tasks.register('runClientBenchmark') {
    group = 'fabric'
    description = 'Run the client with stress + profiler + auto-exit after ${bench}s.'
    finalizedBy tasks.named('runClient')
    outputs.upToDateWhen { false }
    doLast {
        def runClient = tasks.named('runClient').get()
        // workingDir is unreliable at config phase — pin the JFR output to
        // `<test>/run/` regardless of how Loom resolves it later, so the
        // file always lands in a known location.
        def runDir = new File(project.projectDir, 'run')
        runDir.mkdirs()
        def jfrFile = new File(runDir, 'aero-benchmark.jfr').absolutePath
        def jfrRepo = new File(runDir, 'jfr-bench-repo').absolutePath
        def benchSec = (project.findProperty('bench') ?: '90').toString()
        runClient.jvmArgs(
            '-Daero.stresstest=true',
            '-Daero.profiler=true',
            '-Daero.benchmark.exitAfterSec=' + benchSec,
            '-XX:StartFlightRecording=filename=' + jfrFile + ',settings=profile,dumponexit=true,name=aero-bench',
            '-XX:FlightRecorderOptions=repository=' + jfrRepo
        )
        // The benchmark hook does System.exit(0), which Gradle's JavaExec
        // wrapper interprets as failure even though the JFR file is intact.
        // Suppress so CI scripts don't choke.
        runClient.ignoreExitValue = true
        println '[runClientBenchmark] stress + profiler + exit @ ' + benchSec + 's · JFR -> ' + jfrFile
    }
}

// Stress test client run. Dense-grid mode flips inside AeroTestMod via
// `-Daero.stresstest=true`: every chunk gets the full showcase + a 4×4
// motor grid, animated LOD distance bumped to 256 blocks. Combined with
// the profile flags from runClientProfile, this is what we hand the
// reviewer when they ask for harder-stressed benchmarks.
// Empty mode — disables ALL test-mod content (no blocks, no BEs, no
// items, no worldgen placements) so the player can compare FPS against
// just StationAPI + the runtime mod stack (AlwaysMoreItems, glass-
// networking, GlassConfigAPI). Useful for isolating "is this overhead
// from modellib's content, or from the surrounding ecosystem?".
//
// modellib's mixins still apply at class-load (they're declared in the
// mod's mixins.json and the loader can't conditionally skip those without
// custom plugin work) but they no-op because the test mod doesn't
// register any blocks/BEs. Effective overhead: a few HEAD-inject
// method dispatches per PalettedContainer.get call (~ns scale).
tasks.register('runClientEmpty') {
    group = 'fabric'
    description = 'Empty test mod (no content) — measures StationAPI + runtime mods baseline.'
    finalizedBy tasks.named('runClient')
    outputs.upToDateWhen { false }
    doLast {
        def runClient = tasks.named('runClient').get()
        def runDir = runClient.workingDir
        runDir.mkdirs()
        def jfrFile = new File(runDir, 'aero-empty.jfr').absolutePath
        def jfrRepo = new File(runDir, 'jfr-empty-repo').absolutePath
        runClient.jvmArgs(
            '-Daero.testmod.disabled=true',
            '-Daero.profiler=true',
            '-Xms2G',
            '-Xmx4G',
            '-XX:+UnlockExperimentalVMOptions',
            '-XX:+UseZGC',
            '-XX:TieredStopAtLevel=1',
            '-XX:StartFlightRecording=filename=' + jfrFile + ',settings=profile,dumponexit=true,name=aero-empty',
            '-XX:FlightRecorderOptions=repository=' + jfrRepo
        )
        println '[runClientEmpty] StationAPI + runtime mods baseline (no test content) · JFR -> ' + jfrFile
    }
}

// Realistic mode — simulates a typical tech-mod player base, not the
// exhibit-hall density of the demo or the worst-case 23-BEs-per-chunk
// stress test. Each qualifying chunk gets 4 BEs + 3 chunk-baked blocks,
// chunks are 6 apart, so a typical viewing position sees 1-3 bases →
// 4-12 visible BEs. This is the FPS number that reflects real users.
// Factory mode — Satisfactory-style multi-floor base. 8 floors of 16
// motors each (128 animated motors), separated by cobblestone ceilings
// that occlude upper floors when player is on a lower floor. This is
// the closest benchmark to real tech-mod gameplay (multi-floor factory
// bases) — far closer than the surface stress test which had no occlusion.
//
// Default JVM (G1+C2) for peak throughput. Use the `Smooth` variant if
// JIT/GC spikes annoy you more than peak FPS does.
// Factory structure WITHOUT animated BEs — diagnostic isolation. When
// the chunk-update count is high near the factory, this task shows
// whether the cause is the cobblestone-tower lighting cascades (still
// high here) or the animated BEs (low here). Compare this number
// against runClientFactoryDefault.
tasks.register('runClientFactoryEmpty') {
    group = 'fabric'
    description = 'Factory cobblestone structure only (no animated BEs) — isolates lighting cascade cost.'
    finalizedBy tasks.named('runClient')
    outputs.upToDateWhen { false }
    doLast {
        def runClient = tasks.named('runClient').get()
        def runDir = runClient.workingDir
        runDir.mkdirs()
        def jfrFile = new File(runDir, 'aero-factory-empty.jfr').absolutePath
        def jfrRepo = new File(runDir, 'jfr-factory-empty-repo').absolutePath
        runClient.jvmArgs(
            '-Daero.factory=true',
            '-Daero.factoryEmpty=true',
            '-Daero.profiler=true',
            '-Xms2G',
            '-Xmx4G',
            '-XX:StartFlightRecording=filename=' + jfrFile + ',settings=profile,dumponexit=true,name=aero-factory-empty',
            '-XX:FlightRecorderOptions=repository=' + jfrRepo
        )
        println '[runClientFactoryEmpty] cobblestone-only factory · default JVM · JFR -> ' + jfrFile
    }
}

