// G1 with aggressive pause goal — alternative to runClientStress for users
// who hit the FPS spikes that calmilamsy reported. JFR analysis showed
// p95 GC pause ≈ 36 ms on the default G1 config, which causes the
// 180 → 80 FPS spikes when garbage collection lands mid-frame. Flags here
// force G1 to run more frequent but smaller collections (target 10 ms max
// pause), trading slight throughput for stable frame-times.
//
// Heap bumped to 4 GB so young-gen lasts longer between collections; this
// hides allocation pressure from StationAPI/vanilla code (ChunkCache
// autoboxing, Field.copy reflection) which is outside modellib's reach.
tasks.register('runClientStressG1') {
    group = 'fabric'
    description = 'Stress + JFR with tight G1 pause goals (10 ms target, 4 GB heap).'
    finalizedBy tasks.named('runClient')
    outputs.upToDateWhen { false }
    doLast {
        def runClient = tasks.named('runClient').get()
        def runDir = runClient.workingDir
        runDir.mkdirs()
        def jfrFile = new File(runDir, 'aero-stress-g1.jfr').absolutePath
        def jfrRepo = new File(runDir, 'jfr-stress-g1-repo').absolutePath
        runClient.jvmArgs(
            '-Daero.stresstest=true',
            '-Daero.profiler=true',
            '-Xms2G',
            '-Xmx4G',
            '-XX:+UseG1GC',
            '-XX:MaxGCPauseMillis=10',
            '-XX:G1HeapRegionSize=16M',
            '-XX:StartFlightRecording=filename=' + jfrFile + ',settings=profile,dumponexit=true,name=aero-stress-g1',
            '-XX:FlightRecorderOptions=repository=' + jfrRepo
        )
        println '[runClientStressG1] tight G1 (10ms target, 4G heap) · JFR -> ' + jfrFile
    }
}

// ZGC — sub-millisecond pause times regardless of heap size. If the
// runClientStressG1 spikes are still visible (G1's tight goal is best-effort,
// not guaranteed), this trades a bit more CPU + memory for genuinely
// pause-less GC. Java 17+ feature.
tasks.register('runClientStressZGC') {
    group = 'fabric'
